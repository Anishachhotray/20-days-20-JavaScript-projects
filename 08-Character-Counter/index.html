<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer & Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <h1>Text Analyzer & Counter</h1>

        <input type="text" id="textInput" placeholder="Type Something Here.....">

        <div id="results">

            <h3 id="counter">Counter : 0</h3>

            <h3 id="words">Words : 0</h3>

            <h3 id="vowels">Vowels : 0</h3>

            <h3 id="consonants">Consonants : 0</h3>

        </div>

        <button id="analyzeText"> Analyze Text </button>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
