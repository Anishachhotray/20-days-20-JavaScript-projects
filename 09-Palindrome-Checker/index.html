<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <h1>Palindrome Checker</h1>

        <label for="inputText"> Enter a word, sentence, or number here 👇</label>
        <input type="text" id="inputText" placeholder="e.g. madam, racecar, 121">

        <br>

        <button id="check">Check</button>

        <div class="resultBox">

            <p id="result">Reversed : </p>
            <p id="palindrome">Palindrome : </p>

        </div>
       
        <div id="messageBox"></div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
