<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <h1>Password Generator 🔐</h1>

        <div class="inputArea">

            <label for="input"> Enter Length : </label>
            <input type="number" id="input" placeholder="e.g. 7">

        </div>

        <button id="generate">Generate</button>

        <div id="resultArea">

            <span id="result">Your Result : </span>
            <button id="copy">⧉</button>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
