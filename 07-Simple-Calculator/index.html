<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class ="container">

        <div class="display" id="display">0</div>

        <div class="buttons">

            <button id="clear" onclick="clearDisplay()">AC</button>
            <button id="backspace" onclick="deleteLast()">⌫</button>
            <button id="percentage" onclick="appendValue('%')">%</button>
            <button id="divide" onclick="appendValue('/')">÷</button>

            <button id="seven" onclick="appendValue('7')">7</button>
            <button id="eight" onclick="appendValue('8')">8</button>
            <button id="nine" onclick="appendValue('9')">9</button>
            <button id="multiply" onclick="appendValue('*')">×</button>

            <button id="four" onclick="appendValue('4')">4</button>
            <button id="five" onclick="appendValue('5')">5</button>
            <button id="six" onclick="appendValue('6')">6</button>
            <button id="sub" onclick="appendValue('-')">-</button>

            <button id="one" onclick="appendValue('1')">1</button>
            <button id="two" onclick="appendValue('2')">2</button>
            <button id="three" onclick="appendValue('3')">3</button>
            <button id="add" onclick="appendValue('+')">+</button>

            <button id="zero" onclick="appendValue('0')">0</button>
            <button id="decimal" onclick="appendValue('.')">.</button>
            <button id="result" onclick="calculateResult()">=</button>
            
    </div>

</div>
        

        

    </div>

</body>
<script src="script.js"></script>
</html>
